<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caretruck Auto Sdn Bhd — Specialised in European Truck Spare Parts</title>
  <meta name="description" content="Caretruck Auto Sdn Bhd — specialised in European truck spare parts and filtration: Scania, Volvo, Mercedes-Benz, DAF, MAN. Your Share, We Care.">
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; }
    /* Pixel-exact replica of the Caretruck Auto homepage (caretruck.com.my),
       assembled from seamless full-width section images. Scales down on smaller screens. */
    .replica {
      position: relative;
      max-width: 1161px;
      margin: 0 auto;
      background: #fff;
      font-size: 0;            /* remove inline-image gaps */
    }
    .replica img { display: block; width: 100%; height: auto; }
    .replica a   { display: block; }
    /* Clickable WhatsApp hotspot over the floating button baked into the image */
    .wa-hot {
      position: absolute;
      left: 1.4%;
      top: 5.6%;
      width: 5.6%;
      height: 1.6%;
      border-radius: 50%;
      z-index: 5;
    }
  </style>
</head>
<body>

  <!-- ===== SHARED HEADER PANEL (identical to Products page) ===== -->
  <div class="topbar">
    <div class="wrap">
      <div class="tb-left">🚚 “Your Share, We Care” — truck spare parts &amp; filtration, shipping across Malaysia</div>
      <div class="tb-right">
        <a href="tel:+60169433638">+6016-943 3638</a>
        <a href="mailto:kokhong@caretruck.com.my">kokhong@caretruck.com.my</a>
      </div>
    </div>
  </div>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="index.html">
        <img src="assets/logo.jpg" alt="Caretruck Auto — Your Share, We Care" class="brand-logo">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <nav class="main-nav" id="mainNav">
        <a href="index.html" class="active">Home</a>
        <a href="products.html">Products</a>
        <a href="#">Brands</a>
        <a href="#">News</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
      <a class="header-cta" href="https://wa.me/60169433638">Get a Quote</a>
    </div>
  </header>

  <main class="replica">
    <!-- Hero banner: Specialised in European Truck Spare Parts -->
    <img src="assets/home/h1-banner.jpg" alt="Caretruck Auto — Specialised in European Truck Spare Parts" width="1161" height="205">

    <!-- Product categories (clickable → Products page) -->
    <a href="products.html" aria-label="Browse product categories">
      <img src="assets/home/h2-categories.jpg" alt="Categories: MANN Filter, Air Dryer, Engine Part, Air Spring, Air Valve, Gear Part, Headlight, Truck Suspension, Clutch Part" width="1161" height="825">
    </a>

    <!-- Engine divider band -->
    <img src="assets/home/h3-engineband.jpg" alt="" width="1161" height="670">

    <!-- Featured products (clickable → Products page) -->
    <a href="products.html" aria-label="View featured products">
      <img src="assets/home/h4-products.jpg" alt="Featured products: MANN Filter C 25 710/3, Mercedes Actros II, Coolant Filter WF2076" width="1161" height="400">
    </a>

    <!-- Engine parallax band -->
    <img src="assets/home/h5-enginebig.jpg" alt="" width="1161" height="600">

    <!-- Featured posts -->
    <img src="assets/home/h6-posts.jpg" alt="Featured posts" width="1161" height="1100">

    <!-- Dusk MAN trucks band -->
    <img src="assets/home/h7-trucks.jpg" alt="" width="1161" height="560">

    <!-- Our brands -->
    <img src="assets/home/h8-brands.jpg" alt="Our brands: Fleetguard, MANN Filter, WIX" width="1161" height="180">

    <!-- Footer / contact -->
    <img src="assets/home/h9-footer.jpg" alt="Caretruck Auto Sdn Bhd — contact, product categories and newsletter" width="1161" height="789">

    <!-- working WhatsApp link over the baked-in floating button -->
    <a class="wa-hot" href="https://wa.me/60169433638" aria-label="Chat with Caretruck Auto on WhatsApp"></a>
  </main>

  <script>
    const nav = document.getElementById('mainNav');
    document.getElementById('navToggle').addEventListener('click', () => {
      const open = nav.style.display === 'flex';
      nav.style.display = open ? 'none' : 'flex';
      nav.style.flexDirection = 'column';
      nav.style.position = 'absolute';
      nav.style.top = '76px'; nav.style.left = '0'; nav.style.right = '0';
      nav.style.background = '#fff'; nav.style.padding = '14px 6vw';
      nav.style.boxShadow = '0 10px 20px rgba(0,0,0,.08)';
      nav.style.zIndex = '50';
    });
  </script>

</body>
</html>
